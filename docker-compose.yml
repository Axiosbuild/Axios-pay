version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: axios
      POSTGRES_PASSWORD: axios
      POSTGRES_DB: axiospay
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: ******postgres:5432/axiospay
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '3001:3001'
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  pg_data:
