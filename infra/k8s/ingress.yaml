apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: axios-pay-ingress
  namespace: axios-pay
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - axiospay.africa
      secretName: axiospay-africa-tls
  rules:
    - host: axiospay.africa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: axios-pay-web
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: axios-pay-api
                port:
                  number: 3001
