apiVersion: apps/v1
kind: Deployment
metadata:
  name: axios-pay-api
  namespace: axios-pay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: axios-pay-api
  template:
    metadata:
      labels:
        app: axios-pay-api
    spec:
      containers:
        - name: api
          image: registry.digitalocean.com/example/axios-pay-api:latest
          ports:
            - containerPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: axios-pay-api-hpa
  namespace: axios-pay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: axios-pay-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
